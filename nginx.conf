# nginx vhost interno del container — Nginx host externo (en VPS) proxy_pass aquí
server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión razonable para landing estática
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Cache agresivo para assets, none para HTML (queremos que se actualice rápido)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    location ~* \.html$ {
        add_header Cache-Control "public, max-age=300, must-revalidate";
    }

    # Rutas conocidas
    location = / {
        try_files /index.html =404;
    }

    location = /legal.html {
        try_files /legal.html =404;
    }

    location /assets/ {
        try_files $uri =404;
    }

    # Healthcheck endpoint (usado por /opt/scripts/healthcheck.sh y por el healthcheck del container)
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Cualquier otra ruta → 404 limpio (no es SPA, no hay rewriting)
    location / {
        try_files $uri $uri/ =404;
    }

    # Bloquear acceso a archivos ocultos / metadatos
    location ~ /\.(?!well-known) {
        deny all;
    }
}
